<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanBell 2025</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- En-tête Mobile -->
        <header class="mobile-header">
            <div class="header-title">ScanBell 2025</div>
            <div class="status-indicator online" title="Système en ligne"></div>
        </header>

        <!-- Contenu Principal -->
        <main class="main-content">
            <!-- Conteneur Vidéo -->
            <div class="camera-container">
                <video id="videoElement" autoplay playsinline></video>
                <canvas id="detectionCanvas"></canvas>
                
                <!-- Overlay Sonnette -->
                <div class="doorbell-overlay">
                    <div class="doorbell-content">
                        <i class="fas fa-bell doorbell-animation fa-3x"></i>
                        <div class="visitor-info">Nouveau Visiteur</div>
                    </div>
                </div>
            </div>

            <!-- Contrôles -->
            <div class="controls-container">
                <button class="control-button primary">
                    <i class="fas fa-video"></i>
                    <span>Caméra</span>
                </button>
                <button class="control-button success">
                    <i class="fas fa-door-open"></i>
                    <span>Ouvrir</span>
                </button>
                <button class="control-button warning">
                    <i class="fas fa-bell"></i>
                    <span>Sonnette</span>
                </button>
                <button class="control-button danger">
                    <i class="fas fa-ban"></i>
                    <span>Bloquer</span>
                </button>
            </div>

            <!-- Statistiques -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Visiteurs</div>
                    <div class="stat-value">24</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Alertes</div>
                    <div class="stat-value">3</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Humeur</div>
                    <div class="stat-value">😊</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Sécurité</div>
                    <div class="stat-value">98%</div>
                </div>
            </div>

            <!-- Carte Visiteur Actuel -->
            <div class="visitor-card">
                <div class="visitor-header">
                    <div class="visitor-image">
                        <img src="assets/default-avatar.png" alt="Visiteur">
                    </div>
                    <div class="visitor-info">
                        <h3>Jean Dupont</h3>
                        <p>Dernière visite: Aujourd'hui, 14:30</p>
                    </div>
                </div>
                <div class="mood-chart-container">
                    <canvas id="moodChart"></canvas>
                </div>
            </div>

            <!-- Liste des Notifications -->
            <div class="notification-list">
                <div class="notification-item">
                    <div class="notification-icon">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div class="notification-content">
                        <h4>Nouveau Visiteur</h4>
                        <p>Il y a 5 minutes</p>
                    </div>
                </div>
                <div class="notification-item">
                    <div class="notification-icon">
                        <i class="fas fa-door-open"></i>
                    </div>
                    <div class="notification-content">
                        <h4>Porte Ouverte</h4>
                        <p>Il y a 10 minutes</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Navigation Mobile -->
        <nav class="mobile-nav">
            <a href="#" class="nav-item active">
                <i class="fas fa-home"></i>
                <span>Accueil</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Visiteurs</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-chart-bar"></i>
                <span>Stats</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Réglages</span>
            </a>
        </nav>

        <!-- Modal Nouveau Visiteur -->
        <div class="mobile-modal" id="newVisitorModal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Nouveau Visiteur</h3>
                    <button class="modal-close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="visitor-preview">
                    <img src="assets/default-avatar.png" alt="Nouveau Visiteur">
                </div>
                <div class="form-group">
                    <label for="visitorName">Nom du Visiteur</label>
                    <input type="text" id="visitorName" class="form-control">
                </div>
                <div class="form-group">
                    <label for="visitorType">Type de Visiteur</label>
                    <select id="visitorType" class="form-control">
                        <option value="family">Famille</option>
                        <option value="friend">Ami</option>
                        <option value="delivery">Livraison</option>
                        <option value="other">Autre</option>
                    </select>
                </div>
                <button class="control-button primary">
                    <i class="fas fa-save"></i>
                    <span>Enregistrer</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
