<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanBell - Communication</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@next"></script>
    <script src="https://cdn.jsdelivr.net/npm/qr-scanner@1.4.1/qr-scanner.umd.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="app" class="min-h-screen">
        <!-- En-tête -->
        <header class="bg-white shadow-sm">
            <div class="max-w-7xl mx-auto px-4 py-4">
                <div class="flex justify-between items-center">
                    <img src="/assets/logo.png" alt="ScanBell" class="h-8">
                    <div class="text-sm text-gray-500" v-if="connectionStatus">
                        {{ connectionStatus }}
                    </div>
                </div>
            </div>
        </header>

        <!-- Contenu principal -->
        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Étape 1: Scanner -->
            <div v-if="currentStep === 'scan'" class="space-y-6">
                <div class="text-center">
                    <h1 class="text-2xl font-bold text-gray-900">Scannez un tag ScanBell</h1>
                    <p class="mt-2 text-gray-600">Utilisez votre caméra pour scanner un QR code ou approchez votre téléphone d'un tag NFC</p>
                </div>

                <div class="bg-white rounded-lg shadow-sm p-4">
                    <div id="scanner-container" class="aspect-square max-w-md mx-auto"></div>
                </div>

                <div class="flex justify-center space-x-4">
                    <button @click="startScanner" class="px-4 py-2 bg-blue-500 text-white rounded-lg">
                        Scanner QR Code
                    </button>
                    <button @click="checkNFC" class="px-4 py-2 bg-green-500 text-white rounded-lg">
                        Utiliser NFC
                    </button>
                </div>
            </div>

            <!-- Étape 2: Options de contact -->
            <div v-if="currentStep === 'contact'" class="space-y-6">
                <div class="text-center">
                    <h1 class="text-2xl font-bold text-gray-900">{{ ownerInfo.name }}</h1>
                    <p class="mt-2 text-gray-600">Comment souhaitez-vous communiquer ?</p>
                </div>

                <div class="grid gap-4 max-w-md mx-auto">
                    <button 
                        v-if="ownerInfo.features.video"
                        @click="initiateCommunication('video')"
                        class="p-4 bg-blue-500 text-white rounded-lg flex items-center justify-center space-x-2"
                    >
                        <span>Appel Vidéo</span>
                    </button>

                    <button 
                        v-if="ownerInfo.features.audio"
                        @click="initiateCommunication('audio')"
                        class="p-4 bg-green-500 text-white rounded-lg flex items-center justify-center space-x-2"
                    >
                        <span>Appel Audio</span>
                    </button>

                    <button 
                        v-if="ownerInfo.features.message"
                        @click="initiateCommunication('message')"
                        class="p-4 bg-purple-500 text-white rounded-lg flex items-center justify-center space-x-2"
                    >
                        <span>Envoyer un Message</span>
                    </button>
                </div>
            </div>

            <!-- Étape 3: Communication -->
            <div v-if="currentStep === 'communication'" class="space-y-6">
                <div class="bg-white rounded-lg shadow-sm p-4">
                    <div v-if="communicationType === 'video'" class="aspect-video">
                        <video id="remoteVideo" autoplay playsinline class="w-full h-full"></video>
                        <video id="localVideo" autoplay playsinline class="absolute bottom-4 right-4 w-1/4"></video>
                    </div>

                    <div v-if="communicationType === 'message'" class="h-96 flex flex-col">
                        <div class="flex-1 overflow-y-auto p-4 space-y-4">
                            <div v-for="msg in messages" :key="msg.id" 
                                 :class="['p-2 rounded-lg max-w-[80%]', 
                                         msg.sender === 'visitor' ? 'ml-auto bg-blue-500 text-white' : 'bg-gray-100']">
                                {{ msg.content }}
                            </div>
                        </div>
                        <div class="border-t p-4">
                            <form @submit.prevent="sendMessage" class="flex space-x-2">
                                <input v-model="newMessage" type="text" 
                                       class="flex-1 border rounded-lg px-4 py-2" 
                                       placeholder="Votre message...">
                                <button type="submit" 
                                        class="px-4 py-2 bg-blue-500 text-white rounded-lg">
                                    Envoyer
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="flex justify-center">
                    <button @click="endCommunication" 
                            class="px-4 py-2 bg-red-500 text-white rounded-lg">
                        Terminer
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
